{{ $contentsSection := .Site.GetPage "/contents" }}
{{ if $contentsSection }}
<div class="docs-menu">
  <h4>Content</h4>
  <ul>
    {{ range $contentsSection.Pages.ByWeight }}
    <li class="{{ if or (eq .RelPermalink $.RelPermalink) ($.IsDescendant .) }}active{{ end }}">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
